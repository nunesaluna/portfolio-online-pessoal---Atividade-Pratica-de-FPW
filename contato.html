<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menu de Navegação Comum a Todas as Páginas -->
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="color: inherit; text-decoration: none;">Natália</a>
        </div>
        
        <!-- Botão Hambúrguer para Celular -->
        <button id="menu-icon" class="menu-icon">☰</button>
        
        <ul id="nav-links" class="nav-links">
            <li><a href="index.html">Sobre mim</a></li>
            <li><a href="formacao.html">Formação</a></li>
            <li><a href="portfolio.html">Portfólio</a></li>
            <li><a href="contato.html" class="active-link">Contato</a></li>
            <li><button id="theme-toggle" class="btn-tema">Trocar Tema</button></li>
        </ul>
    </nav>

    <main class="container">
        <h1>Entre em Contato</h1>
        <p>Preencha o formulário abaixo para me enviar uma mensagem.</p>

        <form id="contactForm">
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Seu nome completo">
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="usuario@dominio.com">
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Sua mensagem aqui..."></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
        </form>
        
        <!-- Local onde aparecerá a confirmação do envio -->
        <div id="feedback" class="mensagem-sucesso"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
